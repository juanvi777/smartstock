<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear tienda</title>
<link rel="stylesheet" href="css/style.css">

<style>
.panel {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    width: 280px;
    margin: 30px auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.input-pro {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

.btn-pro {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn-pro:hover {
    transform: scale(1.05);
}

.info {
    text-align: center;
    font-size: 14px;
    margin-bottom: 10px;
    color: #333;
}
</style>
</head>
<body>

<button class="btn-volver" onclick="volver()">⬅ Volver</button>

<div class="login-container">

<h2>Crear tienda 🏪</h2>

<div class="panel">

<div class="info">
💡 Crea tu cuenta para empezar a manejar tu negocio con SmartStock
</div>

<input type="text" id="nuevoUser" placeholder="Usuario" class="input-pro">
<input type="password" id="nuevoPass" placeholder="Contraseña" class="input-pro">

<button onclick="crearCuenta()" class="btn-pro">Crear cuenta</button>

</div>

</div>

<script src="js/crear.js"></script>
</body>
</html>
